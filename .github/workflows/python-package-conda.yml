# python-package-conda.yml
# Conda environment configuration for Awesome-Phishing-Bot v9.5.1
# Optimized for Alpine Linux container images

name: awesome-phishing-bot
channels:
  - conda-forge
  - defaults
  - anaconda

dependencies:
  # Core Python
  - python=3.11
  - pip
  - setuptools
  - wheel
  
  # Core dependencies
  - requests>=2.28.0
  - psutil>=5.9.0
  - matplotlib>=3.6.0
  - seaborn>=0.12.0
  - numpy>=1.23.0
  - reportlab>=4.0.0
  
  # Web & Networking
  - flask>=2.2.0
  - aiohttp>=3.8.0
  - asyncio
  - websockets>=10.0
  - paramiko>=2.12.0
  - cryptography>=39.0.0
  
  # Database
  - sqlite>=3.40
  
  # Chat Platforms
  - python-telegram-bot>=20.0
  - discord.py>=2.3.0
  - telethon>=1.28.0
  - slack-sdk>=3.20.0
  
  # Phishing & Security Tools
  - beautifulsoup4>=4.11.0
  - lxml>=4.9.0
  - selenium>=4.8.0
  - shodan>=1.28.0
  - pyhunter>=1.3.0
  
  # Utility
  - qrcode>=7.4.0
  - pyshorteners>=1.0.0
  - colorama>=0.4.6
  - tqdm>=4.64.0
  
  # Image Processing
  - pillow>=9.4.0
  - opencv>=4.7.0
  
  # Security
  - pycryptodome>=3.17.0
  - bcrypt>=4.0.0
  
  # Alpine-specific (via conda-forge)
  - gcc
  - gxx
  - make
  - cmake
  - openssl
  - libffi
  - libxml2
  - libxslt
  - curl
  - wget
  - ca-certificates
  
  # Optional dependencies
  - pip:
    # Core packages not available in conda
    - python-dotenv>=1.0.0
    - pyngrok>=6.0.0
    - cloudscraper>=1.2.71
    - fake-useragent>=1.4.0
    
    # Extended phishing templates
    - jinja2>=3.1.0
    - markdown>=3.4.0
    
    # Monitoring & logging
    - python-json-logger>=2.0.0
    
    # Alpine compatibility packages
    - auditwheel>=5.4.0
    - musllinux
    
    # SSH enhancements
    - asyncssh>=2.13.0
    
    # Web scraping
    - scrapy>=2.8.0
    - playwright>=1.32.0
    
    # Analytics
    - pandas>=1.5.0
    - scikit-learn>=1.2.0
    
    # PDF Generation
    - weasyprint>=59.0
    
    # QR Code with styling
    - qrcode-artistic>=1.0.0
    
    # URL Shorteners (additional)
    - bitly-api>=0.1.0
    - short-url>=1.0.0
    
    # Geolocation
    - geopy>=2.3.0
    - maxminddb-geolite2>=2021.12
    
    # Async support
    - aiodns>=3.0.0
    - aiofiles>=23.1.0
    
    # System monitoring
    - gpustat>=1.1.0
    - netifaces>=0.11.0
    
    # Encryption
    - fernet>=2.0.0
    
    # Testing
    - pytest>=7.2.0
    - pytest-asyncio>=0.20.0

variables:
  - PYTHONUNBUFFERED=1
  - PYTHONDONTWRITEBYTECODE=1
  - PIP_NO_CACHE_DIR=1
  - PIP_DISABLE_PIP_VERSION_CHECK=1

# Platform-specific settings
platforms:
  - linux-64
  - linux-aarch64
  - osx-64
  - win-64

# Additional metadata
about:
  summary: "🌿 AWESOME-PHISHING-BOT v9.5.1 - Ultimate Phishing & Remote Access Bot"
  description: |
    Advanced phishing framework with multi-platform bot support including Telegram,
    Discord, WhatsApp, Slack, iMessage, and Google Chat. Features SSH remote access,
    traffic generation, security scanning, Shodan/Hunter.io integration, and
    comprehensive reporting.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/awesome-phishing-bot
  documentation: https://docs.awesome-phishing-bot.com
